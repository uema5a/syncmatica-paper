name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: a build only needs to read the repo.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # JDK that runs Gradle. The Java 25 toolchain is provisioned by the
      # foojay resolver (settings.gradle.kts), matching the local build.
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      # Dependency caching + automatic Gradle wrapper validation.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew build

      - name: Upload plugin jar
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: syncmatica-paper
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: build/reports/tests/**
